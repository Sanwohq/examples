<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanwo Payment - Vanilla JS Example</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 8px;
      }

      p.subtitle {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: #444;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        margin-bottom: 16px;
        transition: border-color 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #4f46e5;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #4338ca;
      }

      button:disabled {
        background: #a5b4fc;
        cursor: not-allowed;
      }

      #result {
        margin-top: 20px;
        padding: 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: none;
      }

      #result.success {
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }

      #result.cancelled {
        background: #fffbeb;
        color: #92400e;
        border: 1px solid #fde68a;
      }

      #result.error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Sanwo Payment</h1>
      <p class="subtitle">Vanilla JS example with Paystack provider</p>

      <form id="payment-form">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="customer@example.com"
          required
        />

        <label for="amount">Amount (NGN)</label>
        <input
          type="number"
          id="amount"
          placeholder="1000"
          min="1"
          step="1"
          required
        />

        <button type="submit" id="pay-btn">Pay Now</button>
      </form>

      <div id="result"></div>
    </div>

    <script type="module">
      import { createSanwo } from "@sanwohq/web";
      import { paystackProvider } from "@sanwohq/paystack";

      // Replace with your Paystack public key
      const sanwo = createSanwo({
        provider: paystackProvider,
        publicKey: "pk_test_xxxxxxxxxxxxxxxxxxxxx",
      });

      const form = document.getElementById("payment-form");
      const payBtn = document.getElementById("pay-btn");
      const resultDiv = document.getElementById("result");

      function showResult(type, message) {
        resultDiv.className = type;
        resultDiv.textContent = message;
        resultDiv.style.display = "block";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const amountNGN = parseFloat(document.getElementById("amount").value);

        if (!email || !amountNGN) return;

        // Convert to kobo (minor units) for Paystack
        const amountInKobo = Math.round(amountNGN * 100);

        payBtn.disabled = true;
        payBtn.textContent = "Processing...";
        resultDiv.style.display = "none";

        try {
          const result = await sanwo({
            amount: amountInKobo,
            currency: "NGN",
            customer: { email },
          });

          if (result.status === "successful") {
            showResult(
              "success",
              `Payment successful! Reference: ${result.reference}`
            );
          } else if (result.status === "cancelled") {
            showResult("cancelled", "Payment was cancelled.");
          }
        } catch (error) {
          showResult("error", `Payment failed: ${error.message}`);
        } finally {
          payBtn.disabled = false;
          payBtn.textContent = "Pay Now";
        }
      });
    </script>
  </body>
</html>
