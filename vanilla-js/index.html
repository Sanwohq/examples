<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanwo Payment - Vanilla JS Example</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 8px;
      }

      p.subtitle {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: #444;
      }

      select,
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        margin-bottom: 16px;
        transition: border-color 0.2s;
        background: #fff;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: #4f46e5;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #4338ca;
      }

      button:disabled {
        background: #a5b4fc;
        cursor: not-allowed;
      }

      #result {
        margin-top: 20px;
        padding: 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: none;
      }

      #result.success {
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }

      #result.cancelled {
        background: #fffbeb;
        color: #92400e;
        border: 1px solid #fde68a;
      }

      #result.error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      #result.pending {
        background: #eff6ff;
        color: #1e40af;
        border: 1px solid #bfdbfe;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Sanwo Payment</h1>
      <p class="subtitle">Vanilla JS example with all payment providers</p>

      <form id="payment-form">
        <label for="provider">Payment Provider</label>
        <select id="provider" required>
          <option value="paystack">Paystack</option>
          <option value="flutterwave">Flutterwave</option>
          <option value="paypal">PayPal</option>
          <option value="razorpay">Razorpay</option>
          <option value="monnify">Monnify</option>
          <option value="yoco">Yoco</option>
          <option value="interswitch">Interswitch</option>
        </select>

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="customer@example.com"
          required
        />

        <label for="amount">Amount (<span id="currency-label">NGN</span>)</label>
        <input
          type="number"
          id="amount"
          placeholder="1000"
          min="1"
          step="1"
          required
        />

        <button type="submit" id="pay-btn">Pay Now</button>
      </form>

      <div id="result"></div>
    </div>

    <script type="module">
      import { createSanwo } from "@sanwohq/web";
      import { paystackProvider } from "@sanwohq/paystack";
      import { flutterwaveProvider } from "@sanwohq/flutterwave";
      import { paypalProvider } from "@sanwohq/paypal";
      import { razorpayProvider } from "@sanwohq/razorpay";
      import { monnifyProvider } from "@sanwohq/monnify";
      import { yocoProvider } from "@sanwohq/yoco";
      import { interswitchProvider } from "@sanwohq/interswitch";

      // Provider configuration map
      const providers = {
        paystack: {
          provider: paystackProvider,
          publicKey: import.meta.env.VITE_PAYSTACK_PUBLIC_KEY,
          currency: "NGN",
        },
        flutterwave: {
          provider: flutterwaveProvider,
          publicKey: import.meta.env.VITE_FLUTTERWAVE_PUBLIC_KEY,
          currency: "NGN",
        },
        paypal: {
          provider: paypalProvider,
          publicKey: import.meta.env.VITE_PAYPAL_CLIENT_ID,
          currency: "USD",
        },
        razorpay: {
          provider: razorpayProvider,
          publicKey: import.meta.env.VITE_RAZORPAY_KEY_ID,
          currency: "INR",
        },
        monnify: {
          provider: monnifyProvider,
          publicKey: import.meta.env.VITE_MONNIFY_API_KEY,
          currency: "NGN",
          sanwoProviderOptions: {
            contractCode: import.meta.env.VITE_MONNIFY_CONTRACT_CODE,
            isTestMode: true,
          },
        },
        yoco: {
          provider: yocoProvider,
          publicKey: import.meta.env.VITE_YOCO_PUBLIC_KEY,
          currency: "ZAR",
        },
        interswitch: {
          provider: interswitchProvider,
          publicKey: import.meta.env.VITE_INTERSWITCH_MERCHANT_CODE,
          currency: "NGN",
          sanwoProviderOptions: {
            payItemId: import.meta.env.VITE_INTERSWITCH_PAY_ITEM_ID,
          },
        },
      };

      const form = document.getElementById("payment-form");
      const providerSelect = document.getElementById("provider");
      const currencyLabel = document.getElementById("currency-label");
      const payBtn = document.getElementById("pay-btn");
      const resultDiv = document.getElementById("result");

      // Update currency label when provider changes
      providerSelect.addEventListener("change", () => {
        const config = providers[providerSelect.value];
        currencyLabel.textContent = config.currency;
      });

      function showResult(type, message) {
        resultDiv.className = type;
        resultDiv.textContent = message;
        resultDiv.style.display = "block";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const amountInput = parseFloat(document.getElementById("amount").value);
        const selectedProvider = providerSelect.value;

        if (!email || !amountInput) return;

        const config = providers[selectedProvider];

        // Create a new Sanwo instance for the selected provider
        const sanwo = createSanwo({
          provider: config.provider,
          publicKey: config.publicKey,
        });

        // Always convert to minor units — Sanwo's API expects minor units
        const amount = Math.round(amountInput * 100);

        payBtn.disabled = true;
        payBtn.textContent = "Processing...";
        resultDiv.style.display = "none";

        try {
          const paymentOptions = {
            amount,
            currency: config.currency,
            customer: { email },
          };

          // Add provider-specific options if present
          if (config.sanwoProviderOptions) {
            paymentOptions.sanwoProviderOptions = config.sanwoProviderOptions;
          }

          const result = await sanwo(paymentOptions);

          if (result.status === "successful") {
            showResult(
              "success",
              `Payment successful! Reference: ${result.reference}`
            );
          } else if (result.status === "cancelled") {
            showResult("cancelled", "Payment was cancelled.");
          } else if (result.status === "pending") {
            showResult(
              "pending",
              `Payment is pending. Reference: ${result.reference}`
            );
          } else {
            showResult("error", `Payment failed. Status: ${result.status}`);
          }
        } catch (error) {
          showResult("error", `Payment failed: ${error.message}`);
        } finally {
          payBtn.disabled = false;
          payBtn.textContent = "Pay Now";
        }
      });
    </script>
  </body>
</html>
