<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanwo Payment - Vanilla JS Example</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
        padding: 40px;
        width: 100%;
        max-width: 460px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 8px;
      }

      p.subtitle {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: #444;
      }

      select,
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        margin-bottom: 16px;
        transition: border-color 0.2s;
        background: #fff;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: #4f46e5;
      }

      .scenario-desc {
        font-size: 0.8rem;
        color: #888;
        margin: -12px 0 16px;
        line-height: 1.4;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #4338ca;
      }

      button:disabled {
        background: #a5b4fc;
        cursor: not-allowed;
      }

      #result {
        margin-top: 20px;
        padding: 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: none;
      }

      #result.success {
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }

      #result.cancelled {
        background: #fffbeb;
        color: #92400e;
        border: 1px solid #fde68a;
      }

      #result.error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      #result.pending {
        background: #eff6ff;
        color: #1e40af;
        border: 1px solid #bfdbfe;
      }

      optgroup {
        font-weight: 700;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Sanwo Payment</h1>
      <p class="subtitle">
        Vanilla JS example — all providers and scenarios
      </p>

      <form id="payment-form">
        <label for="scenario">Payment Scenario</label>
        <select id="scenario" required>
          <optgroup label="Paystack">
            <option value="paystack-checkout">Paystack — Checkout (default)</option>
            <option value="paystack-new-transaction">Paystack — New Transaction</option>
            <option value="paystack-card-only">Paystack — Card Only</option>
            <option value="paystack-bank-transfer">Paystack — Bank Transfer</option>
          </optgroup>
          <optgroup label="Flutterwave">
            <option value="flutterwave-standard">Flutterwave — Standard</option>
            <option value="flutterwave-card-only">Flutterwave — Card Only</option>
          </optgroup>
          <optgroup label="PayPal">
            <option value="paypal-standard">PayPal — Standard</option>
          </optgroup>
          <optgroup label="Razorpay">
            <option value="razorpay-standard">Razorpay — Standard</option>
          </optgroup>
          <optgroup label="Monnify">
            <option value="monnify-standard">Monnify — Standard</option>
            <option value="monnify-card-only">Monnify — Card Only</option>
            <option value="monnify-transfer-only">Monnify — Bank Transfer Only</option>
          </optgroup>
          <optgroup label="Interswitch">
            <option value="interswitch-standard">Interswitch — Standard</option>
          </optgroup>
        </select>
        <p class="scenario-desc" id="scenario-desc">
          Default Paystack popup checkout flow.
        </p>

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="customer@example.com"
          required
        />

        <label for="amount"
          >Amount (<span id="currency-label">NGN</span>)</label
        >
        <input
          type="number"
          id="amount"
          placeholder="1000"
          min="1"
          step="1"
          required
        />

        <button type="submit" id="pay-btn">Pay with Paystack</button>
      </form>

      <div id="result"></div>
    </div>

    <script type="module">
      import { createSanwo } from "@sanwohq/web";
      import { paystackProvider } from "@sanwohq/paystack";
      import { flutterwaveProvider } from "@sanwohq/flutterwave";
      import { paypalProvider } from "@sanwohq/paypal";
      import { razorpayProvider } from "@sanwohq/razorpay";
      import { monnifyProvider } from "@sanwohq/monnify";
      import { interswitchProvider } from "@sanwohq/interswitch";

      const scenarios = {
        // --- Paystack ---
        "paystack-checkout": {
          provider: paystackProvider,
          publicKey: import.meta.env.VITE_PAYSTACK_PUBLIC_KEY,
          currency: "NGN",
          label: "Paystack",
          description: "Default Paystack popup checkout flow.",
          sanwoProviderOptions: { method: "checkout" },
        },
        "paystack-new-transaction": {
          provider: paystackProvider,
          publicKey: import.meta.env.VITE_PAYSTACK_PUBLIC_KEY,
          currency: "NGN",
          label: "Paystack",
          description:
            "Uses newTransaction method — same UI, tracked differently on the Paystack dashboard.",
          sanwoProviderOptions: { method: "newTransaction" },
        },
        "paystack-card-only": {
          provider: paystackProvider,
          publicKey: import.meta.env.VITE_PAYSTACK_PUBLIC_KEY,
          currency: "NGN",
          label: "Paystack",
          description: "Only card payments allowed via the channels option.",
          sanwoProviderOptions: { method: "checkout", channels: ["card"] },
        },
        "paystack-bank-transfer": {
          provider: paystackProvider,
          publicKey: import.meta.env.VITE_PAYSTACK_PUBLIC_KEY,
          currency: "NGN",
          label: "Paystack",
          description:
            "Only bank transfer allowed — customer pays via account transfer.",
          sanwoProviderOptions: {
            method: "checkout",
            channels: ["bank_transfer"],
          },
        },

        // --- Flutterwave ---
        "flutterwave-standard": {
          provider: flutterwaveProvider,
          publicKey: import.meta.env.VITE_FLUTTERWAVE_PUBLIC_KEY,
          currency: "NGN",
          label: "Flutterwave",
          description: "Standard Flutterwave checkout with all payment options.",
          sanwoProviderOptions: {},
        },
        "flutterwave-card-only": {
          provider: flutterwaveProvider,
          publicKey: import.meta.env.VITE_FLUTTERWAVE_PUBLIC_KEY,
          currency: "NGN",
          label: "Flutterwave",
          description: "Card-only payments via the payment_options param.",
          sanwoProviderOptions: { paymentOptions: "card" },
        },

        // --- PayPal ---
        "paypal-standard": {
          provider: paypalProvider,
          publicKey: import.meta.env.VITE_PAYPAL_CLIENT_ID,
          currency: "USD",
          label: "PayPal",
          description:
            "Standard PayPal Buttons checkout — opens PayPal login popup.",
          sanwoProviderOptions: {},
        },

        // --- Razorpay ---
        "razorpay-standard": {
          provider: razorpayProvider,
          publicKey: import.meta.env.VITE_RAZORPAY_KEY_ID,
          currency: "INR",
          label: "Razorpay",
          description: "Standard Razorpay checkout modal with all methods.",
          sanwoProviderOptions: {},
        },

        // --- Monnify ---
        "monnify-standard": {
          provider: monnifyProvider,
          publicKey: import.meta.env.VITE_MONNIFY_API_KEY,
          currency: "NGN",
          label: "Monnify",
          description:
            "Standard Monnify checkout with card and bank transfer.",
          sanwoProviderOptions: {
            contractCode: import.meta.env.VITE_MONNIFY_CONTRACT_CODE,
            isTestMode: true,
          },
        },
        "monnify-card-only": {
          provider: monnifyProvider,
          publicKey: import.meta.env.VITE_MONNIFY_API_KEY,
          currency: "NGN",
          label: "Monnify",
          description: "Only card payments via the paymentMethods option.",
          sanwoProviderOptions: {
            contractCode: import.meta.env.VITE_MONNIFY_CONTRACT_CODE,
            isTestMode: true,
            paymentMethods: ["CARD"],
          },
        },
        "monnify-transfer-only": {
          provider: monnifyProvider,
          publicKey: import.meta.env.VITE_MONNIFY_API_KEY,
          currency: "NGN",
          label: "Monnify",
          description:
            "Bank transfer only — customer pays via account transfer.",
          sanwoProviderOptions: {
            contractCode: import.meta.env.VITE_MONNIFY_CONTRACT_CODE,
            isTestMode: true,
            paymentMethods: ["ACCOUNT_TRANSFER"],
          },
        },

        // --- Interswitch ---
        "interswitch-standard": {
          provider: interswitchProvider,
          publicKey: import.meta.env.VITE_INTERSWITCH_MERCHANT_CODE,
          currency: "NGN",
          label: "Interswitch",
          description: "Standard Interswitch Webpay checkout.",
          sanwoProviderOptions: {
            payItemId: import.meta.env.VITE_INTERSWITCH_PAY_ITEM_ID,
          },
        },
      };

      const form = document.getElementById("payment-form");
      const scenarioSelect = document.getElementById("scenario");
      const scenarioDesc = document.getElementById("scenario-desc");
      const currencyLabel = document.getElementById("currency-label");
      const payBtn = document.getElementById("pay-btn");
      const resultDiv = document.getElementById("result");

      function updateUI() {
        const config = scenarios[scenarioSelect.value];
        currencyLabel.textContent = config.currency;
        scenarioDesc.textContent = config.description;
        payBtn.textContent = "Pay with " + config.label;
      }

      scenarioSelect.addEventListener("change", updateUI);
      updateUI();

      function showResult(type, message) {
        resultDiv.className = type;
        resultDiv.textContent = message;
        resultDiv.style.display = "block";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const amountInput = parseFloat(document.getElementById("amount").value);
        const selected = scenarioSelect.value;

        if (!email || !amountInput) return;

        const config = scenarios[selected];

        const sanwo = createSanwo({
          provider: config.provider,
          publicKey: config.publicKey,
        });

        const amount = Math.round(amountInput * 100);

        payBtn.disabled = true;
        payBtn.textContent = "Processing...";
        resultDiv.style.display = "none";

        try {
          const result = await sanwo({
            amount,
            currency: config.currency,
            customer: { email },
            description: "Sanwo example payment",
            sanwoProviderOptions: config.sanwoProviderOptions,
          });

          if (result.status === "successful") {
            showResult(
              "success",
              "Payment successful! Reference: " + result.reference
            );
          } else if (result.status === "cancelled") {
            showResult("cancelled", "Payment was cancelled.");
          } else if (result.status === "pending") {
            showResult(
              "pending",
              "Payment is pending. Reference: " + result.reference
            );
          } else {
            showResult("error", "Payment failed. Status: " + result.status);
          }
        } catch (error) {
          showResult("error", "Payment failed: " + error.message);
        } finally {
          payBtn.disabled = false;
          updateUI();
        }
      });
    </script>
  </body>
</html>
